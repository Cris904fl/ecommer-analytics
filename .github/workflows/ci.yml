name: CI/CD — E-Commerce Analytics Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ecommerce-analytics-api

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: |
          pip install "black==24.10.0" "isort==5.13.2" "flake8==7.1.1" "mypy==1.11.2"

      - name: Black (formatting)
        run: black --check src/ dags/

      - name: isort (import order)
        run: isort --check-only src/ dags/

      - name: Flake8 (style)
        run: flake8 src/ dags/ --max-line-length=100 --exclude=__pycache__

  # ─────────────────────────────────────────────
  # Job 2: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # Job 3: Integration Test (pipeline runs)
  # ─────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate sample data
        run: python scripts/generate_sample_data.py

      - name: Run cleaning pipeline
        run: python -m src.pipeline.cleaner

      - name: Train ML models
        run: python -m src.ml.models

      - name: Verify outputs exist
        run: |
          test -f data/processed/orders_clean.csv && echo "✓ Clean data exists"
          test -f models/anomaly_detector.pkl     && echo "✓ Anomaly model exists"
          test -f models/revenue_forecaster.pkl   && echo "✓ Forecaster model exists"

      - name: API smoke test
        run: |
          uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/ | python -m json.tool
          curl -f http://localhost:8000/kpis/summary | python -m json.tool

  # ─────────────────────────────────────────────
  # Job 4: Build & Push Docker Image (main only)
  # ─────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags (lowercase)
        id: tags
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "latest=ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          echo "sha=ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ steps.tags.outputs.latest }}
            ${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max